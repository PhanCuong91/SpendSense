name: Comprehensive PR Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened, closed, labeled]
    branches: [main]

jobs:
  # 1. This job runs when the PR is labeled with "check"
  check-label:
    if: github.event.action == 'labeled' && github.event.label.name == 'check'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python: '3.13-slim'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        env:
          PYTHONPATH: src
          POLL_ONCE: "true"
        run: |
          python3 -m app.workers.poller_worker

  # 2. This job runs when the PR is labeled with "merge"
  merge-label:
    if: github.event.action == 'labeled' && github.event.label.name == 'merge'
    runs-on: ubuntu-latest
    steps:
      - name: Run Merge Label Deployment
        run: echo "Preparing deployment for merge label..."

  # 2. This job executes ONLY when a PR is formally merged to main
  production-deployment:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Run Production Deployment
        run: echo "Deploying container to AWS ECR & App Runner..."