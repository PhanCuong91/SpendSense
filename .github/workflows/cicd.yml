name: Comprehensive PR Pipeline

on:
  pull_request:
    types:
      - labeled
  workflow_dispatch:

jobs:
  check-label:
    if: github.event.label.name == 'check'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python: '3.13-slim'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        env:
          PYTHONPATH: src
          POLL_ONCE: "true"
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
        run: |
          python3 -m app.workers.poller_worker
      # --- Step 2: Automatically Remove the Label ---

    # 2. This job runs when the PR is labeled with "merge"
  merge-label:
    if: github.event.label.name == 'merge'
    runs-on: ubuntu-latest
    steps:
      - name: Run Merge Label Deployment
        run: echo "Preparing deployment for merge label..."
  cleanup:
    if: always()
    uses: ./.github/workflows/remove-label.yml
    secrets:
      TOKEN: ${{ secrets.TOKEN }}

