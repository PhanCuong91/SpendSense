name: Comprehensive PR Pipeline

on:
  pull_request:
    types:
      - labeled
  workflow_dispatch:

jobs:
  check-label:
    if: github.event.label.name == 'check'
    uses: ./.github/workflows/python-test.yml

    with:
      command: |
          python3 -m pytest -q tests/test_gmail_polling.py
          python3 -m pytest -q tests/test_parser.py
    secrets:
      GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
      GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
  # 2. This job runs when the PR is labeled with "merge"
  merge-label:
    if: github.event.label.name == 'merge'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: src
          POLL_ONCE: "true"
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
        run: |
          python3 -m pytest -q tests/test_gmail_polling.py
          python3 -m pytest -q tests/test_parser.py

      - name: Merge pull request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'merge'
            })

  cleanup:
    if: always()
    uses: ./.github/workflows/remove-label.yml
    secrets:
      TOKEN: ${{ secrets.TOKEN }}

