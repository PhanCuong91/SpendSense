name: Comprehensive PR Pipeline

on:
  pull_request:
    types:
      - labeled
  workflow_dispatch:

jobs:
  # ==========================================
  # PROCESS 1: RUN CHECK TESTS
  # ==========================================
  check-label:
    if: github.event.label.name == 'check'
    uses: ./.github/workflows/python-test.yml

    with:
      command: |
          python3 -m pytest -q tests/test_gmail_polling.py
          python3 -m pytest -q tests/test_parser.py
    secrets:
      GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
      GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}

  # ==========================================
  # PROCESS 2: RUN MERGE TESTS & AUTO-MERGE
  # ==========================================

  merge-label:
    if: github.event.label.name == 'merge'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: src
          POLL_ONCE: "true"
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
        run: |
          python3 -m pytest -q tests/test_gmail_polling.py
          python3 -m pytest -q tests/test_parser.py

      - name: Merge pull request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TOKEN }}
          script: |
            github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'merge'
            })

  # ==========================================
  # PROCESS 3: CD DEPLOYMENT
  # ==========================================
  continuous-deployment:
    name: Deploy to AWS
    needs: check-label
    runs-on: ubuntu-latest
    env:
      # COMMIT_SHA: ${{ needs.merge-label.outputs.merged_sha }}
      COMMIT_SHA: 1234
      AWS_REGION: ap-southeast-1
      PROJECT_NAME: spend_sense
      ECR_REGISTRY: 359615771071.dkr.ecr
      SECRET_CREDENTIAL_NAME: spendsense_gmail_credentials_json
      SECRET_TOKEN_NAME: spendsense_gmail_token_json
      AWS_SECRET_NAME: aws_secretsmanager_secret
      AWS_SECRET_RESOURCE_CREDENTIAL: gmail_credentials
      AWS_SECRET_RESOURCE_TOKEN: gmail_token
      TF_STATE_BUCKET: spendsense-tfstate-359615771071
      TF_STATE_KEY: spendsense/terraform.tfstate

    # Add these exact permissions lines:
    permissions:
      id-token: write   # Mandatory for OIDC authentication with AWS
      contents: read    # Mandatory for actions/checkout to read your code
    steps:
    - name: Name for AWS resouce access
      run: |
        echo "IMAGE_TAG=1234" >> $GITHUB_ENV

    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Validate deployment environment
      run: |
        set -euo pipefail
        : "${AWS_REGION:?AWS_REGION is not set}"
        : "${PROJECT_NAME:?PROJECT_NAME is not set}"
        if [ -z "${GMAIL_CREDENTIALS_JSON:-}" ]; then
          echo "::error::GMAIL_CREDENTIALS_JSON secret is not set"
          exit 1
        fi
        if [ -z "${GMAIL_TOKEN_JSON:-}" ]; then
          echo "::error::GMAIL_TOKEN_JSON secret is not set"
          exit 1
        fi
        if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
          echo "::error::AWS credentials secrets are not set"
          exit 1
        fi
        echo "Deployment environment validated: region=${AWS_REGION}, project=${PROJECT_NAME}"
      env:
        GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
        GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.9.0" # Specify your required version here

    - name: Build docker image
      id: build-image
      run: |
        aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin 359615771071.dkr.ecr.ap-southeast-1.amazonaws.com
        docker build -t spend_sense:${{ env.IMAGE_TAG }} .
        docker tag spend_sense:${{ env.IMAGE_TAG }} 359615771071.dkr.ecr.ap-southeast-1.amazonaws.com/spend_sense:${{ env.IMAGE_TAG }}
        docker push 359615771071.dkr.ecr.ap-southeast-1.amazonaws.com/spend_sense:${{ env.IMAGE_TAG }}
        
    - name: Login to AWS
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Verify AWS authentication
      run: |
        set -euo pipefail
        aws sts get-caller-identity

    # - name: Tag and Push Docker Image to ECR
    #   run: |
    #     echo "Logging in to Amazon ECR..."
    #     aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}.${{env.AWS_REGION}}.amazonaws.com
    #     echo "Tagging and pushing the Docker image..."
    #     docker tag spend_sense:${{ env.IMAGE_TAG }} ${{ env.ECR_REGISTRY }}.${{env.AWS_REGION}}.amazonaws.com/${{ env.PROJECT_NAME }}:${{ env.IMAGE_TAG }}
    #     docker push ${{ env.ECR_REGISTRY }}.${{env.AWS_REGION}}.amazonaws.com/${{ env.PROJECT_NAME }}:${{ env.IMAGE_TAG }}
    #     echo "image=${{ env.ECR_REGISTRY }}.${{env.AWS_REGION}}.amazonaws.com/${{ env.PROJECT_NAME }}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT 

    - name: Terraform Init (S3 remote backend)
      id: tf-init
      working-directory: deploy_1
      run: terraform init -input=false

    - name: Import existing secrets if not already tracked in state
      working-directory: deploy_1
      run: |
        set -euo pipefail
        import_if_missing() {
          local resource_addr="$1"
          local secret_name="$2"
          if terraform state show "${resource_addr}" >/dev/null 2>&1; then
            echo "${resource_addr} already tracked in state, skipping import."
            return 0
          fi
          local arn
          arn=$(aws secretsmanager describe-secret --secret-id "${secret_name}" --query 'ARN' --output text 2>/dev/null || true)
          if [ -z "${arn}" ] || [ "${arn}" = "None" ]; then
            echo "${secret_name} does not exist yet, Terraform will create it."
            return 0
          fi
          aws secretsmanager restore-secret --secret-id "${secret_name}" --region "${AWS_REGION}" 2>/dev/null || true
          terraform import "${resource_addr}" "${arn}"
        }

        import_if_missing "${AWS_SECRET_NAME}.${AWS_SECRET_RESOURCE_CREDENTIAL}" "${SECRET_CREDENTIAL_NAME}"
        import_if_missing "${AWS_SECRET_NAME}.${AWS_SECRET_RESOURCE_TOKEN}" "${SECRET_TOKEN_NAME}"

    - name: Terraform Plan (remote state)
      id: tf-plan
      working-directory: deploy_1
      env:
        TF_VAR_gmail_credentials_json: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
        TF_VAR_gmail_token_json: ${{ secrets.GMAIL_TOKEN_JSON }}
      run: |
        set -o pipefail
        terraform plan -input=false -lock-timeout=300s -var="app_image_tag=${{ env.IMAGE_TAG }}" -out=tfplan 2>&1 | tee plan_output.log
        plan_exit=${PIPESTATUS[0]}
        if [ "${plan_exit}" -ne 0 ]; then
          if grep -qi "Error acquiring the state lock" plan_output.log; then
            echo "::error::Another deployment is already holding the Terraform state lock. Aborting this run."
          fi
          exit "${plan_exit}"
        fi

    - name: Capture pre-apply state version
      working-directory: deploy_1
      run: |
        set -euo pipefail
        pre_version=$(aws s3api head-object --bucket "${TF_STATE_BUCKET}" --key "${TF_STATE_KEY}" --query 'VersionId' --output text 2>/dev/null || echo "none")
        echo "PRE_APPLY_STATE_VERSION=${pre_version}" >> "$GITHUB_ENV"
        echo "State object version before apply: ${pre_version}"

    - name: Terraform Apply (remote state)
      id: tf-apply
      working-directory: deploy_1
      run: |
        set -o pipefail
        terraform apply -input=false -auto-approve -lock-timeout=300s tfplan 2>&1 | tee apply_output.log
        apply_exit=${PIPESTATUS[0]}
        if [ "${apply_exit}" -ne 0 ]; then
          if grep -qi "Error acquiring the state lock" apply_output.log; then
            echo "::error::Another deployment is already holding the Terraform state lock. Aborting this run."
          fi
          exit "${apply_exit}"
        fi

    - name: Verify Terraform state persisted in S3
      working-directory: deploy_1
      run: |
        set -euo pipefail
        post_version=$(aws s3api head-object --bucket "${TF_STATE_BUCKET}" --key "${TF_STATE_KEY}" --query 'VersionId' --output text)
        echo "State object version after apply: ${post_version}"
        if [ "${post_version}" = "${PRE_APPLY_STATE_VERSION}" ]; then
          echo "::error::Terraform state object in S3 was not updated by this apply (version unchanged: ${post_version})."
          exit 1
        fi
        echo "Confirmed Terraform state was written to s3://${TF_STATE_BUCKET}/${TF_STATE_KEY} (new version ${post_version})"

    # - name: Fill New Image ID in ECS Task Definition
    #   id: task-def
    #   uses: aws-actions/amazon-ecs-render-task-definition@v1
    #   with:
    #     task-definition: ${{ env:ECS_TASK_DEFINITION }}
    #     container-name: ${{ env:CONTAINER_NAME }}
    #     image: ${{ steps.build-image.outputs.image }}

    # - name: Deploy Amazon ECS Task Definition
    #   uses: aws-actions/amazon-ecs-deploy-task-definition@v2
    #   with:
    #     task-definition: ${{ steps.task-def.outputs.task-definition }}
    #     service: ${{ env:ECS_SERVICE }}
    #     cluster: ${{ env:ECS_CLUSTER }}
    #     wait-for-service-stability: true

  cleanup:
    if: always()
    uses: ./.github/workflows/remove-label.yml
    secrets:
      TOKEN: ${{ secrets.TOKEN }}

