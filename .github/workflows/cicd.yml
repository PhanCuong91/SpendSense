name: Comprehensive PR Pipeline

on:
  pull_request:
    types:
      - labeled
  workflow_dispatch:

jobs:
  check-label:
    if: github.event.label.name == 'check'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python: '3.13-slim'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        env:
          PYTHONPATH: src
          POLL_ONCE: "true"
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
        run: |
          python3 -m app.workers.poller_worker
      # --- Step 2: Automatically Remove the Label ---
      - name: Remove 'check' Label
        # Run this even if the previous testing steps fail so the label isn't stuck
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'check'
              });
              console.log("Successfully removed 'check' label from PR.");
            } catch (error) {
              // If the label was already removed manually during execution, don't crash the pipeline
              console.log("Label 'check' might have already been removed: " + error.message);
            }
