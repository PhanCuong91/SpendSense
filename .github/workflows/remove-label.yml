on:
  workflow_call:
    secrets:
      TOKEN:
        required: true

jobs:
  remove:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions-ecosystem/action-remove-labels@v1
        with:
          github_token: ${{ secrets.TOKEN }}
          labels: ${{ github.event.label.name }}