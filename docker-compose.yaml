name: SpendSense

x-service-defaults: &service-defaults
  build:
    context: .
    dockerfile: Dockerfile
    args:
      APP_VERSION: ${APP_VERSION:-dev}
      VCS_REF: ${VCS_REF:-local}
      BUILD_DATE: ${BUILD_DATE:-unknown}
  image: tx-email:${APP_VERSION:-dev}
  restart: unless-stopped
  init: true
  volumes:
    - sqlite_data:/data

services:
  api:
    <<: *service-defaults
    container_name: tx-api
    environment:
      APP_ROLE: api
      DATABASE_URL: sqlite:////data/txdb.sqlite3
      TZ: Asia/Singapore
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\", timeout=3)' >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  poller-worker:
    <<: *service-defaults
    container_name: tx-poller
    environment:
      APP_ROLE: poller
      DATABASE_URL: sqlite:////data/txdb.sqlite3

  correlator-worker:
    <<: *service-defaults
    container_name: tx-correlator
    environment:
      APP_ROLE: correlator
      DATABASE_URL: sqlite:////data/txdb.sqlite3

volumes:
  sqlite_data: