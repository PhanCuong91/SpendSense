[alembic]
script_location = app/db/migrations
sqlalchemy.url = sqlite:///./data/txdb.sqlite3

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)s %(asctime)s %(name)s %(message)s


# Running locally, you can set the DATABASE_URL environment variable to point to your local SQLite DB file. For example:
# export DATABASE_URL=sqlite:///./data/txdb.sqlite3